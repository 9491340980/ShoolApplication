<div class="min-h-screen flex items-center justify-center flex-col relative overflow-hidden px-4 py-8"
     style="background: linear-gradient(135deg, #1a56db 0%, #1240a8 50%, #0f2d6e 100%)">
  <div class="absolute w-[500px] h-[500px] bg-white/5 rounded-full -top-36 -right-36"></div>
  <div class="absolute w-[350px] h-[350px] bg-white/5 rounded-full -bottom-24 -left-24"></div>

  <button
    class="absolute top-4 right-4 bg-white/15 text-white border border-white/30 rounded-xl px-3.5 py-1.5 text-xs font-bold cursor-pointer hover:bg-white/25 z-10"
    (click)="i18n.toggle()"
  >
    {{ i18n.lang() === 'te' ? 'EN' : 'తెలుగు' }}
  </button>

  <div class="bg-white rounded-3xl p-8 sm:p-10 w-full max-w-md shadow-2xl z-10">
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">🏫</div>
      <h1 class="font-display text-[22px] text-primary font-extrabold tracking-tight">{{ 'appName' | t }}</h1>
      <p class="text-muted text-[13px] mt-0.5">{{ 'tagline' | t }}</p>
    </div>

    <!-- One-click demo logins -->
    <p class="text-[13px] font-semibold mb-2.5">⚡ {{ 'demoTitle' | t }}</p>
    <div class="grid grid-cols-2 gap-2.5 mb-6">
      @for (r of roles; track r[0]) {
        <button
          class="border-2 border-line rounded-xl px-2.5 py-3.5 bg-white cursor-pointer text-center text-[13px] font-medium text-muted transition-all hover:border-primary hover:bg-primary-light hover:text-primary hover:-translate-y-0.5 hover:shadow-lg hover:shadow-primary/15"
          (click)="auth.loginDemo(r[0])"
        >
          <span class="block text-[22px] mb-1.5">{{ r[1].icon }}</span>
          {{ r[1].label | t }}
        </button>
      }
    </div>

    <!-- Google sign-in: school owners & super admin -->
    <button
      class="w-full mb-5 py-3 bg-white border-2 border-line rounded-xl text-[14px] font-semibold cursor-pointer transition-all hover:border-primary hover:bg-primary-light flex items-center justify-center gap-2.5 disabled:opacity-60"
      [disabled]="busy()"
      (click)="google()"
    >
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
        <path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/>
      </svg>
      {{ 'signInWithGoogle' | t }}
    </button>

    <div class="flex items-center gap-3 mb-5">
      <div class="h-px bg-line flex-1"></div>
      <span class="text-[11px] text-muted font-semibold uppercase tracking-wide">{{ 'loginBtn' | t }}</span>
      <div class="h-px bg-line flex-1"></div>
    </div>

    <!-- Real login form -->
    <form (ngSubmit)="submit()">
      <div class="mb-4">
        <label class="block text-[13px] font-medium mb-1.5">{{ 'mobileUser' | t }}</label>
        <input class="input !py-3" type="text" name="identifier" [ngModel]="identifier()" (ngModelChange)="identifier.set($event)" placeholder="demo-hm@vidyasetu.app" />
      </div>
      <div class="mb-4">
        <label class="block text-[13px] font-medium mb-1.5">{{ 'password' | t }}</label>
        <input class="input !py-3" type="password" name="password" [ngModel]="password()" (ngModelChange)="password.set($event)" placeholder="••••••••" />
      </div>
      @if (error(); as err) {
        <div class="bg-danger-light text-red-700 rounded-lg px-3 py-2.5 text-xs font-medium mb-4">{{ err }}</div>
      }
      <button class="w-full py-3.5 bg-primary text-white rounded-xl text-[15px] font-semibold cursor-pointer transition-all hover:bg-primary-dark hover:shadow-lg hover:shadow-primary/35 disabled:opacity-60" [disabled]="busy()">
        {{ 'loginBtn' | t }} →
      </button>
    </form>

    <p class="text-center text-xs text-muted mt-4">
      📞 {{ 'helpline' | t }} <strong class="text-primary">9000000001</strong>
    </p>
    <p class="text-center text-[11px] text-muted mt-2">
      <a routerLink="/privacy" class="hover:text-primary underline">Privacy Policy</a>
    </p>
  </div>
</div>
